<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tê Tê Beer - Tìm điểm bán</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header class="hero">

    <img
    src="logo.jpg"
    alt="Tê Tê Beer"
    class="logo"
>

    <h1>FIND PLACES SELLING TÊ TÊ BEER</h1>

    <p>
        Discover the bars, restaurants, and eateries
        serving Tê Tê Craft Beer nationwide.
    </p>
<div id="stats"></div>
    <input
    id="search"
    type="text"
    placeholder="Search venues..."
>


<select id="provinceFilter">

    <option value="">
        All Cities
    </option>

</select>

<div id="provinceButtons"></div>
<button id="nearMeBtn">
    📍 Places near you
</button>

</header>
<section id="list"></section>

<div class="load-more-wrap">
    <button id="loadMoreBtn">
        Xem thêm
    </button>
</div>


<script src="script.js"></script>
<footer>
    © 2026 Tê Tê Beer. All rights reserved.
</footer>

</body>
</html>
