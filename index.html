<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
    <title>Tê Tê Beer - Tìm điểm bán</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="hero">

    <img
    src="logo.jpg"
    alt="Tê Tê Beer"
    class="logo"
>

    <h1> TÊ TÊ BEER DRINKING SPOT</h1>

    <p>
        WELCOME TO THE HANGOUT!
        We are having 80+ spots across Vietnam. 
        FIND YOUR NEAREST BELOW!!
    </p>
<div id="stats"></div>
    <input
    id="search"
    type="text"
    placeholder="Search venues..."
>


<select id="provinceFilter">

    <option value="">
        All Cities
    </option>

</select>

<div id="provinceButtons"></div>
<button id="nearMeBtn">
    📍 Places near you
</button>
<button id="aboutBeerBtn">
    🍺 Tê Tê Beer Story
</button>
</header>
<section id="list"></section>

<div class="load-more-wrap">
    <button id="loadMoreBtn">
        Xem thêm
    </button>
</div>


<footer>
    © 2026 Tê Tê Beer. All rights reserved.
</footer>
<div id="beerModal" class="modal">

    <span id="closeModal">&times;</span>

    <img
        src="background.jpg"
        class="modal-image"
        alt="Tê Tê Beer Story"
    >

</div>
<script src="script.js"></script>
</body>
</html>
